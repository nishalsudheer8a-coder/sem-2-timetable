<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Countdown</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
}

.container {
    width: 95%;
    max-width: 800px;
}

/* HEADER */
h2 {
    text-align: center;
    margin: 15px 0;
}

/* CARD STYLE */
.exam-card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.exam-card.completed {
    opacity: 0.6;
}

.exam-title {
    font-size: 18px;
    font-weight: bold;
}

.exam-details {
    font-size: 14px;
    margin-top: 5px;
}

.countdown {
    margin-top: 10px;
    font-weight: bold;
    color: #007bff;
}

.completed-text {
    color: green;
    font-weight: bold;
}

/* DESKTOP TABLE */
@media (min-width: 700px) {
    .exam-card {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        align-items: center;
    }

    .exam-title {
        font-size: 16px;
    }

    .exam-details {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="container">
<h2>📚 Exam Countdown</h2>

<div id="examList"></div>

</div>

<script>
const exams = [
    {
        name: "Maths",
        start: "May 5, 2026 01:00:00 PM",
        end: "May 5, 2026 03:30:00 PM"
    },
    {
        name: "Chemistry",
        start: "May 7, 2026 09:30:00 AM",
        end: "May 7, 2026 12:00:00 PM"
    },
    {
        name: "Foundation",
        start: "May 11, 2026 01:00:00 PM",
        end: "May 11, 2026 03:30:00 PM"
    },
    {
        name: "C-programming",
        start: "May 13, 2026 01:00:00 PM",
        end: "May 13, 2026 03:30:00 PM"
    },
    {
        name: "IPR",
        start: "May 15, 2026 09:30:00 AM",
        end: "May 15, 2026 12:00:00 PM"
    },
    {
        name: "AI-introduction",
        start: "May 18, 2026 09:30:00 AM",
        end: "May 18, 2026 12:00:00 PM"
    }
];

// ASK PERMISSION FOR NOTIFICATIONS
if ("Notification" in window) {
    Notification.requestPermission();
}

function renderExams() {
    const container = document.getElementById("examList");
    container.innerHTML = "";

    const now = new Date().getTime();

    // SORT exams
    exams.sort((a, b) => new Date(a.start) - new Date(b.start));

    exams.forEach((exam) => {
        const start = new Date(exam.start).getTime();
        const end = new Date(exam.end).getTime();

        const card = document.createElement("div");
        card.className = "exam-card";

        let countdownText = "";

        // ✅ COMPLETED
        if (now > end) {
            countdownText = `<span class="completed-text">✅ Exam Completed</span>`;
            card.classList.add("completed");
        } 
        // ⏳ ONGOING
        else if (now >= start && now <= end) {
            countdownText = `<span style="color: orange;">📝 Exam Ongoing</span>`;
        } 
        // ⏱ UPCOMING
        else {
            const distance = start - now;

            const days = Math.floor(distance / (1000*60*60*24));
            const hours = Math.floor((distance/(1000*60*60)) % 24);
            const minutes = Math.floor((distance/(1000*60)) % 60);
            const seconds = Math.floor((distance/1000) % 60);

            countdownText = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            // 🔔 NOTIFICATION (30 mins before)
            const notifyTime = start - (30 * 60 * 1000);

            if (now >= notifyTime && now < notifyTime + 2000 && Notification.permission === "granted") {
                new Notification(`⏰ Upcoming Exam: ${exam.name}`, {
                    body: "Starts in 30 minutes!",
                });
            }
        }

        card.innerHTML = `
            <div class="exam-title">${exam.name}</div>
            <div class="exam-details">${new Date(exam.start).toLocaleDateString()}</div>
            <div class="exam-details">
                ${new Date(exam.start).toLocaleTimeString()} - 
                ${new Date(exam.end).toLocaleTimeString()}
            </div>
            <div class="countdown">${countdownText}</div>
        `;

        container.appendChild(card);
    });
}

// RUN EVERY SECOND
setInterval(renderExams, 1000);
renderExams();
</script>

</body>
</html>
